services:
  review-api:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  collector:
    build: .
    command: ["bioevidence", "schedule", "${BIOEVIDENCE_TOPIC:-general biomedical research}"]
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
